provider: groq # Peut être "local" ou "groq" (API)
groq_model: llama-3.1-8b-instant


# Paramètres modèle local (Ollama)
local_model: gemma4:31b # Nom du modèle Ollama utilisé
local_base_url: http://localhost:11434

# Paramètres de génération
temperature: 0 # 0 = déterministe (obligatoire pour la baseline)
max_tokens: 2000 # réponse courte (~1 phrase)

# Dataset
dataset_type: specific # "specific" ou "unspecific"
languages:
  - fr
  - es
  - de
  - ru
  - en

# Dossiers
data_dir: data
output_dir: outputs
log_dir: logs

# Variant de la baseline
variant: baseline #system_constrained #cot_cultural #rewritten_query

# Définition des prompts pour le Lot C
variants_templates:
  baseline: "{question}"
  system_constrained: "Tu es un expert culturel. Réponds de manière neutre et en une seule phrase : {question}"
  cot_cultural: "Analyse d'abord le contexte culturel spécifique à la langue de cette question, puis donne ta réponse finale en une phrase : {question}"
  rewritten_query: "Reformule cette question pour lever toute ambiguïté culturelle et réponds-y brièvement : {question}"